# ─────────────────────────────────────────────────────────────────────────────
# mock_config.ini — configure o protótipo sem tocar em Python
# ─────────────────────────────────────────────────────────────────────────────

[Geral]
mock_ativo = true

# ── Fatores padrão de status ──────────────────────────────────────────────────
# Fração do vida_max usada quando _maxima não for preenchido no personagem,
# e também ao criar fichas novas pelo sistema.
# Fórmula: valor_max = max(1, round(vida_max * fator))
[Status.Padrao]
sangue_fator   = 0.86
sanidade_fator = 0.57
vigor_fator    = 0.14
mana_fator     = 0.44
ki_fator       = 0.14
arcana_fator   = 0.14

# ── Jogadores / Mestre ────────────────────────────────────────────────────────
# user = login usado na tela de acesso
# role é opcional — quem for mestre em alguma campanha recebe role=mestre automaticamente
[Jogador.duda]
nome  = Duds
user  = duda
senha = 1234

[Jogador.leo]
nome  = Leo
user  = leo
senha = 1234

[Jogador.jon]
nome  = Jon
user  = jon
senha = 1234

[Jogador.marc]
nome  = Marc
user  = marc
senha = 1234

[Jogador.zeny]
nome  = Zeny
user  = zeny
senha = 002502

# ── Campanhas ─────────────────────────────────────────────────────────────────
# mestre    = user do mestre
# jogadores = users separados por vírgula
[Campanha.ironthorn]
titulo    = A Maldição de Ironthorn
descricao = Uma maldição ancestral ameaça a cidade mineira de Ironthorn. Heróis são convocados para desvendar o mistério.
mestre    = jon
jogadores = duda,leo

[Campanha.rosa]
titulo    = Rosa Escarlate
descricao = Uma história de intrigas e segredos na corte do reino de Valoria.
mestre    = zeny
jogadores = duda,marc

