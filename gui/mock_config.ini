# ─────────────────────────────────────────────────────────────────────────────
# mock_config.ini — configure os dados do protótipo sem tocar em Python
# ─────────────────────────────────────────────────────────────────────────────

[Geral]
mock_ativo = true

# ── Fatores padrão de status ──────────────────────────────────────────────────
# Usados quando o campo _maxima de um personagem não for preenchido,
# e também ao criar fichas novas pelo sistema (botão Criar Ficha).
# Fórmula:  valor_max = max(1, round(vida_max * fator))
# Deixe um campo _atual vazio numa seção [Personagem.X] para assumir 100%.
[Status.Padrao]
sangue_fator   = 0.86
sanidade_fator = 0.57
vigor_fator    = 0.14
mana_fator     = 0.44
ki_fator       = 0.14
arcana_fator   = 0.14

# ── Campanha ativa ────────────────────────────────────────────────────────────
[Campanha]
titulo    = A Maldição de Ironthorn
descricao = Uma maldição ancestral ameaça a cidade mineira de Ironthorn. Heróis são convocados para desvendar o mistério.
mestre    = zeny
jogadores = duda,marquinhos,leo

