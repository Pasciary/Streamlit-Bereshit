# ── Combate inicial ───────────────────────────────────────────────────────────
# campanha    = chave da campanha em combate
# ativa       = true para abrir o app já com combate em andamento
# turno_atual = índice (0-based) de quem está na vez na lista abaixo
# participantes: nome:tipo:iniciativa separados por vírgula
#   tipo = jogador → busca ficha pelo nome automaticamente
#   tipo = monstro → sem ficha (aparece botão "Criar Ficha")
[Combate]
campanha      = ironthorn
ativa         = true
rodada        = 2
turno_atual   = 1
participantes = Layla Jinx:jogador:18, Thorn Hollow:jogador:14, Goblin:monstro:12
